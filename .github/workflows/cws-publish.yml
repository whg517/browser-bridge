name: CWS Publish

# Publish the built extension to the Chrome Web Store via the CWS API.
#
# DECOUPLED and OPT-IN, mirroring sbom.yml: runs on `release: published` (after
# release.yml has shipped the binaries) or manual dispatch, so a store-side
# failure can NEVER block the GitHub release. It only runs when the maintainer
# has flipped the repo variable CWS_AUTO_PUBLISH to 'true' AND provided the
# OAuth secrets — otherwise the job is skipped, and existing releases are
# unaffected.
#
# Review is NOT skippable: this uploads + submits; the store still reviews every
# update (days) before it goes live. Prereleases (-dev/-rc tags) are ignored.
#
# One-time setup (Developer Dashboard + Google Cloud OAuth):
#   Repo variable:  CWS_AUTO_PUBLISH = true   (and optionally CWS_ITEM_ID)
#   Repo secrets:    CWS_CLIENT_ID, CWS_CLIENT_SECRET, CWS_REFRESH_TOKEN
# See docs/chrome-web-store.md § "自动发布流水线".
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish to the store (e.g. v0.1.0)"
        required: true

permissions:
  contents: read # read the released source; no release assets are touched

jobs:
  publish:
    name: upload-and-publish
    runs-on: ubuntu-22.04
    # Opt-in only, and never for prereleases. On workflow_dispatch there is no
    # release payload, so the maintainer's explicit dispatch is the gate.
    if: >-
      ${{ vars.CWS_AUTO_PUBLISH == 'true' &&
          (github.event_name == 'workflow_dispatch' ||
           github.event.release.prerelease == false) }}
    env:
      # The store-assigned item id is public (it's in the manifest-derived ID
      # docs); allow an override via a repo variable but default to the known id.
      ITEM_ID: ${{ vars.CWS_ITEM_ID || 'dgccjfjjilfpkbdllclmkiicajndkfcd' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Build from the exact released code.
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Build extension bundle
        run: |
          npm ci
          npm run build
        working-directory: extension

      - name: Stage store package (manifest at root, no `key`)
        run: |
          set -euo pipefail
          rm -rf build/cws && mkdir -p build/cws
          cp -r extension/dist/* build/cws/
          # The store rejects a package containing `key` and assigns its own id.
          node -e '
            const fs = require("fs");
            const p = "build/cws/manifest.json";
            const m = JSON.parse(fs.readFileSync(p, "utf8"));
            delete m.key;
            fs.writeFileSync(p, JSON.stringify(m, null, 2));
          '
          (cd build/cws && zip -rX ../../browser-bridge-cws.zip . -x ".*")
          echo "packaged:"; unzip -l browser-bridge-cws.zip

      - name: Verify secrets present
        env:
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          missing=""
          [ -n "${CLIENT_ID:-}" ]     || missing="$missing CWS_CLIENT_ID"
          [ -n "${CLIENT_SECRET:-}" ] || missing="$missing CWS_CLIENT_SECRET"
          [ -n "${REFRESH_TOKEN:-}" ] || missing="$missing CWS_REFRESH_TOKEN"
          if [ -n "$missing" ]; then
            echo "::error::CWS_AUTO_PUBLISH is on but these secrets are missing:$missing"
            exit 1
          fi

      - name: Upload and publish to Chrome Web Store
        env:
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          set -euo pipefail

          echo "[cws] exchanging refresh token for an access token"
          TOKEN="$(curl -sS -X POST 'https://oauth2.googleapis.com/token' \
            -d "client_id=${CLIENT_ID}" \
            -d "client_secret=${CLIENT_SECRET}" \
            -d "refresh_token=${REFRESH_TOKEN}" \
            -d 'grant_type=refresh_token' | jq -r '.access_token // empty')"
          if [ -z "$TOKEN" ]; then
            echo "::error::failed to obtain an access token (check OAuth secrets)"
            exit 1
          fi

          echo "[cws] uploading package to item ${ITEM_ID}"
          UP="$(curl -sS -X PUT \
            -H "Authorization: Bearer ${TOKEN}" \
            -H 'x-goog-api-version: 2' \
            -T browser-bridge-cws.zip \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${ITEM_ID}")"
          echo "$UP"
          STATE="$(echo "$UP" | jq -r '.uploadState // empty')"
          if [ "$STATE" != "SUCCESS" ]; then
            echo "::error::upload did not succeed (uploadState=$STATE)"
            echo "$UP" | jq -r '.itemError // empty'
            exit 1
          fi

          echo "[cws] publishing item ${ITEM_ID} (queues for store review)"
          PUB="$(curl -sS -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H 'x-goog-api-version: 2' \
            -H 'Content-Length: 0' \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${ITEM_ID}/publish")"
          echo "$PUB"
          # `status` is an array like ["OK"] on success; anything else is a failure.
          if ! echo "$PUB" | jq -e '.status | index("OK")' >/dev/null; then
            echo "::error::publish call did not return OK"
            exit 1
          fi
          echo "[cws] submitted — the store will review before it goes live"
