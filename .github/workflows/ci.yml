name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt, clippy, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # Reads the pinned channel + components from rust-toolchain.toml.
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo build --release

  extension:
    name: Extension (typecheck, lint, format, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: npm ci
        working-directory: extension
      - name: Contracts in sync (ops.ts generated from contracts/tools.json)
        run: |
          node scripts/gen-ops.mjs
          npm --prefix extension exec prettier -- --write extension/src/shared/ops.ts
          git diff --exit-code -- extension/src/shared/ops.ts \
            || { echo "::error::ops.ts is stale — run 'make gen' after editing contracts/tools.json"; exit 1; }
      - run: npm run typecheck
        working-directory: extension
      - run: npm run lint
        working-directory: extension
      - run: npm run format:check
        working-directory: extension
      - run: npm test
        working-directory: extension
      - run: npm run build
        working-directory: extension

  version-consistency:
    name: Version and extension ID consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - run: ./scripts/check-version.sh
      - run: node scripts/check-extension-id.mjs

  scripts:
    name: Shell scripts (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # shellcheck is preinstalled on GitHub's ubuntu runners.
      - run: shellcheck install/install.sh scripts/*.sh tests/run_all.sh

  linux-install:
    name: Linux installer (isolated XDG directories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
        working-directory: extension
      - run: npm run build
        working-directory: extension
      - name: Install for Chrome and Chromium
        run: |
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          XDG_DATA_HOME="$tmp/data" \
          XDG_CONFIG_HOME="$tmp/config" \
            ./install/install.sh --browser both --skip-extension-build
          test -x "$tmp/data/browser-bridge/browser-bridge"
          test -x "$tmp/data/browser-bridge/run-host.sh"
          test -f "$tmp/config/google-chrome/NativeMessagingHosts/com.browser_bridge.host.json"
          test -f "$tmp/config/chromium/NativeMessagingHosts/com.browser_bridge.host.json"
          grep -q 'chrome-extension://mkjjlmjbcljpcfkfadfmhblmmddkdihf/' \
            "$tmp/config/google-chrome/NativeMessagingHosts/com.browser_bridge.host.json"
          "$tmp/data/browser-bridge/browser-bridge" --help

  e2e:
    name: Protocol e2e (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: cargo build --release
      - run: python3 tests/e2e.py

  browser:
    name: DOM + smoke (Chrome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        id: chrome
        with:
          chrome-version: stable
      - run: npm ci
        working-directory: extension
      - run: npm run build
        working-directory: extension
      - run: npm ci
        working-directory: tests
      - name: Typecheck tests
        run: npm run typecheck
        working-directory: tests
      - name: DOM-layer tests
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: bun tests/dom_test.ts
      - name: Extension smoke test
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        # The smoke test needs a non-headless browser (MV3 SW reliability), so
        # give it a virtual display. xvfb ships on GitHub's ubuntu runners.
        run: xvfb-run -a bun tests/ext_test.ts
