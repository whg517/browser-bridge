name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt, clippy, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Reads the pinned channel + components from rust-toolchain.toml.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo build --release

  extension:
    name: Extension (typecheck, lint, format, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - uses: oven-sh/setup-bun@v2
      - run: npm ci
        working-directory: extension
      - run: npm run typecheck
        working-directory: extension
      - run: npm run lint
        working-directory: extension
      - run: npm run format:check
        working-directory: extension
      - run: npm test
        working-directory: extension
      - run: npm run build
        working-directory: extension

  version-consistency:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-version.sh

  scripts:
    name: Shell scripts (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # shellcheck is preinstalled on GitHub's ubuntu runners.
      - run: shellcheck install.sh scripts/*.sh tests/run_all.sh

  e2e:
    name: Protocol e2e (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cargo build --release
      - run: python3 tests/e2e.py

  browser:
    name: DOM + smoke (Chrome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v2
      - uses: browser-actions/setup-chrome@v1
        id: chrome
        with:
          chrome-version: stable
      - run: npm ci
        working-directory: extension
      - run: npm run build
        working-directory: extension
      - run: npm ci
        working-directory: tests
      - name: Typecheck tests
        run: npm run typecheck
        working-directory: tests
      - name: DOM-layer tests
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: bun tests/dom_test.ts
      - name: Extension smoke test
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        # The smoke test needs a non-headless browser (MV3 SW reliability), so
        # give it a virtual display. xvfb ships on GitHub's ubuntu runners.
        run: xvfb-run -a bun tests/ext_test.ts
