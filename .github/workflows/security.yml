name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC (catch newly-disclosed advisories)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo:
    name: cargo audit + deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-deny,cargo-audit
      - name: cargo audit (RustSec advisories)
        run: cargo audit
      - name: cargo deny (advisories + licenses + bans + sources)
        run: cargo deny check

  npm:
    name: npm audit (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [extension, tests]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      # Fail only on high/critical; dev-only moderates are reported, not gated.
      - run: npm audit --audit-level=high
        working-directory: ${{ matrix.dir }}
