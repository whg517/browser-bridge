name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC (catch newly-disclosed advisories)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo:
    name: cargo audit + deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-deny,cargo-audit
      - name: cargo audit (RustSec advisories)
        run: cargo audit
      - name: cargo deny (advisories + licenses + bans + sources)
        run: cargo deny check

  npm:
    name: npm audit (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [extension, tests]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      # Fail only on high/critical; dev-only moderates are reported, not gated.
      - run: npm audit --audit-level=high
        working-directory: ${{ matrix.dir }}
