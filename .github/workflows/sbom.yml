name: SBOM

# Generate a CycloneDX Software Bill of Materials from the committed lockfiles
# (Cargo.lock + extension/package-lock.json) and attach it to the GitHub
# Release. Runs on `release: published` — i.e. AFTER release.yml has created the
# release — so it never races the binary publish and a SBOM-tooling failure can
# never block shipping the binary. Scans declared dependencies from lockfiles,
# not an installed tree (a fresh checkout has no node_modules/target).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)attach the SBOM to (e.g. v0.1.0)"
        required: true

permissions:
  contents: write # attach the SBOM asset to the release

jobs:
  sbom:
    name: generate-sbom
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Build the SBOM from the exact released code.
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: browser-bridge.cdx.json
          # Keep a CI artifact; attach to the release explicitly below so the
          # target tag is deterministic on both trigger types.
          upload-artifact: true
          upload-release-assets: false

      - name: Attach SBOM to release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: browser-bridge.cdx.json
          fail_on_unmatched_files: true
