name: Release

# Tag a version to publish prebuilt tarballs (binary + built extension +
# installer) so users don't need Rust/Node:  git tag v0.1.0 && git push --tags
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write # create the GitHub Release + upload assets
  id-token: write # OIDC token to sign the SLSA build provenance
  attestations: write # write the build-provenance attestation

jobs:
  release:
    name: ${{ matrix.platform }}-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel (x64) macOS is intentionally NOT built and will not be
          # re-added: Apple Silicon is the supported macOS target, and Intel
          # users can run the arm64 binary under Rosetta 2 or build from source.
          - os: macos-14
            platform: macos
            arch: arm64
          # Build on an older glibc baseline for wider Linux compatibility.
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: windows-2022
            platform: windows
            arch: x64
    runs-on: ${{ matrix.os }}
    env:
      ARCH: ${{ matrix.arch }}
      PLATFORM: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Pin to the tag being released. On tag push github.ref_name IS the
          # tag; on workflow_dispatch the run's ref is a branch (tags can't be
          # picked in the UI), so without this we'd build main and mislabel it
          # under inputs.tag. Mirror sbom.yml, which already pins its ref.
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20

      - name: Verify tag matches Cargo version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VER="${TAG#v}"          # strip leading v
          CORE="${VER%%-*}"       # strip any -dev/-rc pre-release suffix
          CARGO_VER="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "tag=$TAG core=$CORE cargo=$CARGO_VER"
          [ "$CORE" = "$CARGO_VER" ] || { echo "tag core $CORE != Cargo version $CARGO_VER"; exit 1; }

      - name: Build binary
        run: cargo build --release

      - name: Build extension bundle
        run: |
          npm ci
          npm run build
        working-directory: extension

      - name: Package release archive
        id: pkg
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          NAME="browser-bridge-${TAG}-${PLATFORM}-${ARCH}"
          mkdir -p "$NAME/extension"
          cp -r extension/dist "$NAME/extension/dist"
          cp install/mcp-config.example.json LICENSE README.md "$NAME/"
          if [ "$PLATFORM" = "windows" ]; then
            cp target/release/browser-bridge.exe "$NAME/"
            cp install/install.ps1 "$NAME/"
            7z a -tzip "$NAME.zip" "$NAME" > /dev/null
            sha256sum "$NAME.zip" > "$NAME.zip.sha256"
            ARCHIVE="$NAME.zip"
          else
            cp target/release/browser-bridge "$NAME/"
            cp install/install.sh "$NAME/"
            tar czf "$NAME.tar.gz" "$NAME"
            if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256"
            else
              sha256sum "$NAME.tar.gz" > "$NAME.tar.gz.sha256"
            fi
            ARCHIVE="$NAME.tar.gz"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "sha256file=$ARCHIVE.sha256" >> "$GITHUB_OUTPUT"

      # The built extension bundle is platform-independent, so we emit the
      # standalone zip on ONLY the macos/arm64 leg to avoid uploading duplicate
      # (conflicting) assets from both matrix legs. The linux leg skips this
      # step, and `assets` below is empty there (harmless blank lines in the
      # upload glob), so its release upload still matches only its own tarball.
      - name: Package standalone extension zip
        id: extzip
        if: matrix.platform == 'macos'
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          NAME="browser-bridge-extension-${TAG}"
          sha() {
            if command -v shasum >/dev/null 2>&1; then shasum -a 256 "$1" > "$1.sha256"
            else sha256sum "$1" > "$1.sha256"; fi
          }
          # Two zips with the SAME contents but DIFFERENT `key` handling — they
          # cannot be merged, because the two install paths need opposite things:
          #
          # (1) $NAME.zip — "Load unpacked" (developers): manifest.json at the zip
          #     root, `key` KEPT. The key derives the pinned extension ID the
          #     native host's allowed_origins trusts; without it an unpacked load
          #     gets a path-derived ID and native messaging is refused.
          (cd extension/dist && zip -rX "../../$NAME.zip" . -x ".*")
          sha "$NAME.zip"
          # (2) $NAME-store.zip — Chrome Web Store upload: same files but the
          #     manifest `key` is STRIPPED. The published store item's manifest
          #     has no `key` (the store owns the signing key that derives the
          #     store ID), so an update upload must NOT carry one — otherwise the
          #     dashboard rejects it: "manifest key does not match current
          #     content". The store ID is already trusted via dual-ID (ADR-0019).
          rm -rf store-pkg && cp -r extension/dist store-pkg
          node -e 'const fs=require("fs");const f="store-pkg/manifest.json";const m=JSON.parse(fs.readFileSync(f,"utf8"));delete m.key;fs.writeFileSync(f,JSON.stringify(m,null,2));'
          (cd store-pkg && zip -rX "../$NAME-store.zip" . -x ".*")
          sha "$NAME-store.zip"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          {
            echo "assets<<EOF"
            echo "$NAME.zip"
            echo "$NAME.zip.sha256"
            echo "$NAME-store.zip"
            echo "$NAME-store.zip.sha256"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.pkg.outputs.archive }}

      # Attest both standalone extension zips on the same (macos) leg that built them.
      - name: Attest extension zip provenance
        if: matrix.platform == 'macos'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            ${{ steps.extzip.outputs.name }}.zip
            ${{ steps.extzip.outputs.name }}-store.zip

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.sha256file }}
            ${{ steps.extzip.outputs.assets }}
          fail_on_unmatched_files: true
          # Generate the auto "What's Changed" notes on ONE leg only. This step
          # runs on every matrix leg (each uploads its own platform asset to the
          # shared release), and generate_release_notes on each leg concatenates
          # a fresh notes block into the body — three legs produced three
          # duplicate "What's Changed" sections. The other legs pass no body, and
          # softprops preserves the existing release body, so notes land once.
          generate_release_notes: ${{ matrix.platform == 'macos' }}
          # any tag with a suffix (v0.1.0-dev, -rc.1, …) is a prerelease
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-') }}
