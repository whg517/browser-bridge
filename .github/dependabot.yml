version: 2
updates:
  # Rust crate deps
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(cargo)"

  # Extension (esbuild / typescript / eslint / prettier / @types)
  - package-ecosystem: npm
    directory: /extension
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(ext)"
    ignore:
      # TypeScript 7 (the native/Go compiler) breaks `npm ci` here: typescript-eslint
      # peer-requires `typescript <6.1.0`, so TS>=7 fails ERESOLVE (see PR #9). Skip
      # major bumps to 7+ until typescript-eslint widens its peer range; 5.x/6.0
      # patch+minor updates still flow. (tests/ has no typescript-eslint and is
      # already on TS7, so this only applies to the extension.)
      - dependency-name: "typescript"
        versions: [">=7.0.0"]

  # Test harness (puppeteer-core / bun+chrome types / typescript)
  - package-ecosystem: npm
    directory: /tests
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(tests)"

  # GitHub Actions versions (keeps the pinned actions fresh)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(actions)"
