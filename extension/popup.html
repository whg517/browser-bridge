<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Browser Bridge</title>
  <style>
    :root {
      --fg: #111827; --muted: #6b7280; --faint: #9ca3af;
      --line: #e5e7eb; --line-soft: #f3f4f6; --bg-soft: #f9fafb;
      --brand: #2e8b57; --brand-dark: #276b46;
      --danger: #dc2626;
      --ok: #2e8b57; --bad: #dc2626;
      --warn-border: #f0c674; --warn-bg: #fff8e1;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--fg);
    }
    * { box-sizing: border-box; }
    body { width: 320px; margin: 0; padding: 14px; font-size: 13px; }

    h1 { font-size: 14px; margin: 0 0 12px; display: flex; align-items: center;
         justify-content: space-between; gap: 8px; }
    #open-settings { flex: none; width: auto; padding: 5px 10px; border: 1px solid var(--line);
                     border-radius: 8px; background: #fff; cursor: pointer; font-size: 12px;
                     font-weight: 600; color: var(--fg); }
    #open-settings:hover { background: var(--bg-soft); }

    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
              padding: 9px 11px; border-radius: 10px; background: var(--bg-soft);
              border: 1px solid var(--line); font-weight: 500; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; box-shadow: 0 0 0 3px rgba(0,0,0,0.04); }
    .dot.ok { background: var(--ok); box-shadow: 0 0 0 3px rgba(46,139,87,0.15); }
    .dot.bad { background: var(--bad); box-shadow: 0 0 0 3px rgba(220,38,38,0.15); }

    .pending { background: var(--warn-bg); border: 1px solid var(--warn-border); padding: 10px;
               border-radius: 10px; margin-bottom: 12px; }
    .pending .lead { font-weight: 600; margin-bottom: 4px; }
    .pending .glob { font-family: ui-monospace, monospace; word-break: break-all; font-size: 12px;
                     color: var(--fg); }
    .row { display: flex; gap: 8px; }
    .pending .row button { flex: 1; padding: 7px 8px; border-radius: 8px; border: 1px solid var(--line);
                           background: #fff; cursor: pointer; font-size: 12px; font-weight: 600; }
    .pending .row button.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    .pending .row button.primary:hover { background: var(--brand-dark); }
    .pending .row button.danger { color: var(--danger); border-color: var(--line); }
    .pending .row button.danger:hover { background: #fef2f2; }

    .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
                     font-weight: 700; color: var(--muted); margin: 4px 2px 6px; }
    .list { max-height: 220px; overflow-y: auto; border: 1px solid var(--line); border-radius: 10px; }
    .list:empty { display: none; }
    .item { display: flex; align-items: center; justify-content: space-between; gap: 8px;
            padding: 7px 10px; border-bottom: 1px solid var(--line-soft); }
    .item:last-child { border-bottom: none; }
    .item code { font-size: 11px; font-family: ui-monospace, monospace; word-break: break-all; }
    .item button.danger { flex: none; padding: 4px 9px; border: none; background: transparent;
                          color: var(--danger); cursor: pointer; font-size: 12px; font-weight: 600;
                          border-radius: 6px; }
    .item button.danger:hover { background: #fef2f2; }
    .empty { color: var(--faint); padding: 14px; text-align: center; font-size: 12px;
             border: 1px dashed var(--line); border-radius: 10px; }

    /* ---- Dark mode: flip the tokens + the few hardcoded surfaces ---- */
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #e6e8eb; --muted: #9aa3af; --faint: #6b7280;
        --line: #333a44; --line-soft: #262b32; --bg-soft: #20242a;
        --brand: #3fa76a; --brand-dark: #348a58;
        --danger: #f87171;
        --warn-border: #6b5a1e; --warn-bg: #2b2718;
      }
      body { background: #15181c; }
      #open-settings, .pending .row button, .list { background: #1e2228; }
      #open-settings:hover { background: #262b32; }
      .pending .row button.primary { background: var(--brand); }
      .pending .row button.primary:hover { background: var(--brand-dark); }
      .pending .row button.danger { background: #1e2228; }
      .pending .row button.danger:hover,
      .item button.danger:hover { background: #3a1f1f; }
    }
  </style>
</head>
<body>
  <h1>Browser Bridge <button id="open-settings">⚙ Settings</button></h1>
  <div class="status">
    <span id="dot" class="dot bad"></span>
    <span id="status-text">checking…</span>
  </div>

  <div id="pending" class="pending" style="display:none">
    <div class="lead">A new site wants access:</div>
    <div class="glob" id="pending-glob"></div>
    <div class="row" style="margin-top:8px">
      <button id="deny" class="danger">Deny</button>
      <button id="allow" class="primary">Allow</button>
    </div>
  </div>

  <div class="section-title">Allowed sites</div>
  <div id="list" class="list"></div>
  <div id="empty" class="empty">No sites allowed yet.</div>

  <script src="popup.js"></script>
</body>
</html>
