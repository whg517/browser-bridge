# cargo-deny config — supply-chain gate for the Rust crate.
# Run: cargo deny check   (CI: .github/workflows/security.yml)

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# The crate is Apache-2.0; only allow permissive, compatible licenses in deps.
# Only the licenses currently present in the dependency tree. A new license
# here fails the check on purpose — review it before widening the list.
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "Unicode-3.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
